<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Authenticating…</title>
    <style>
        body { font-family: system-ui, Arial, sans-serif; text-align: center; padding: 48px 16px; max-width: 520px; margin: 0 auto; line-height: 1.5; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .err { color: #c0392b; text-align: left; }
        .tip { font-size: 0.95rem; color: #555; text-align: left; margin-top: 1rem; }
        a.btn { display: inline-block; margin-top: 1rem; padding: 10px 18px; background: #3498db; color: #fff; text-decoration: none; border-radius: 6px; }
        a.btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div id="stage">
        <h2>🔐 Processing authentication…</h2>
        <div class="spinner"></div>
        <p>Please wait while we log you in…</p>
    </div>
    <script>
        (function () {
            const stage = document.getElementById('stage');

            function showError(title, detail, extraTip) {
                var html = '<h2 class="err">' + title + '</h2>';
                if (detail) html += '<p>' + detail + '</p>';
                if (extraTip) html += '<p class="tip">' + extraTip + '</p>';
                html += '<a class="btn" href="{{ url_for("login") }}">Request a new login link</a>';
                stage.innerHTML = html;
            }

            // Query string may carry tokens/errors on some redirects
            var qs = new URLSearchParams(window.location.search);
            if (qs.get('error') || qs.get('error_description')) {
                var ed = qs.get('error_description') || qs.get('error') || 'Login could not complete.';
                showError('❌ Login error', ed, null);
                return;
            }

            // PKCE / server redirect: ?code= — full page GET so Flask can exchange
            if (qs.get('code')) {
                window.location.replace(window.location.pathname + '?' + qs.toString());
                return;
            }

            // token_hash flow sometimes only in query after redirect
            if (qs.get('token_hash') && qs.get('type')) {
                window.location.replace(window.location.pathname + '?' + qs.toString());
                return;
            }

            var hash = window.location.hash ? window.location.hash.substring(1) : '';
            if (!hash) {
                showError(
                    '❌ No authentication data found',
                    'The login link may have been changed by your email program (for example Microsoft Outlook &quot;Safe Links&quot;), which can remove the part of the link after <code>#</code>.',
                    '<strong>What to try:</strong> In your email, copy the <em>entire</em> magic link, paste it into Chrome or Safari, and go. Or open the email in webmail and click the link there. Then request a new link from the login page if it still fails.'
                );
                return;
            }

            var params = new URLSearchParams(hash);
            if (params.get('error') || params.get('error_description')) {
                var msg = params.get('error_description') || params.get('error') || 'Login could not complete.';
                showError('❌ Login error', msg, null);
                return;
            }

            var accessToken = params.get('access_token');
            var refreshToken = params.get('refresh_token');
            var expiresAt = params.get('expires_at');

            if (accessToken) {
                var callbackUrl = '/auth/callback?access_token=' + encodeURIComponent(accessToken) +
                    (refreshToken ? '&refresh_token=' + encodeURIComponent(refreshToken) : '') +
                    (expiresAt ? '&expires_at=' + encodeURIComponent(expiresAt) : '');
                window.location.replace(callbackUrl);
                return;
            }

            // Some clients put PKCE `code` in the fragment instead of query
            if (params.get('code')) {
                window.location.replace('/auth/callback?' + params.toString());
                return;
            }

            showError(
                '❌ Error: No access token found',
                'The login link may be invalid, expired, or altered by your email client.',
                'Request a new magic link and open it in a normal browser window. If you use Outlook, try copying the full link or using Outlook on the web.'
            );
        })();
    </script>
</body>
</html>
